name: Sync World Cup scores

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" "https://www.sridads.com/api/sync-scores?key=${{ secrets.SYNC_SECRET }}")
          echo "HTTP $code"
          cat /tmp/out.json || true
          if [ "$code" != "200" ]; then
            echo "::warning::Sync endpoint returned HTTP $code"
          fi
